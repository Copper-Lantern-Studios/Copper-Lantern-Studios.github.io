<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copper Lantern Studios</title>

    <style>
        :root {
            --background: #030405;
            --copper: #ab501c;
            --text: #f3e7dc;
            --muted: #a89586;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        .container img {
            max-width: 600px;
            width: 80%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .tagline {
            color: var(--copper);
            font-size: 0.95rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        footer {
            text-align: center;
            padding: 1.25rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
            margin: 0 0.4rem;
        }

        footer a:hover {
            color: var(--copper);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <img src="logo.png" alt="Copper Lantern Studios">
            <div class="tagline">Apps • Games • Tools</div>
        </div>
    </main>

    <footer>
        <a href="/support/">Support</a>
        ·
        <a href="/privacy/">Privacy</a>
    </footer>
</body>
</html>
