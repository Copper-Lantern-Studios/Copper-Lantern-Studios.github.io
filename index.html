<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copper Lantern Studios</title>

    <style>
        body {
            margin: 0;
            background: #030405;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, serif;
        }

        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        .container img {
            max-width: 600px;
            width: 80%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .tagline {
            color: #ab501c;
            font-size: 0.95rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Copper Lantern Studios">
        <div class="tagline">Apps • Games • Tools</div>
    </div>
</body>
</html>
